<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>dzartovs.</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      /* Base styles */
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background-color: black;
        color: white;
        font-family: "Inter", sans-serif;
      }

      /* Navbar */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        backdrop-filter: blur(6px);
        transition: background-color 0.4s ease;
      }

      .navbar.scrolled {
        background-color: rgba(0, 0, 0, 0.85);
      }

      .glass {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(13.6px);
        -webkit-backdrop-filter: blur(13.6px);
      }


      /* Panels */
      section.panel {
        position: relative;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 1.2s ease, transform 1.2s ease;
      }

      section.panel.visible {
        opacity: 1;
        transform: translateY(0);
      }

      section.panel video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        transform: scale(1.1);
        transition: transform 2s ease;
      }

      section.panel.visible video {
        transform: scale(1);
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: -1;
      }

      .panel-content {
        position: relative;
        z-index: 2;
        padding: 0 20px;
      }

      /* Hero-specific layout */
      #hero .panel-content {
        position: absolute;
        bottom: 5%;
        left: 5%;
        text-align: left;
      }

      #hero .panel-content h1 {
        font-size: 5rem;
        font-weight: 700;
        margin: 0;
      }

      @media (max-width: 768px) {
        #hero .panel-content h1 {
          font-size: 3rem;
        }
      }

      .panel-content h1 {
        font-size: 4rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .panel-content p {
        font-size: 1.1rem;
        color: #ddd;
        max-width: 700px;
        margin: 0 auto;
      }

      a {
        color: #00bcd4;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        .panel-content h1 {
          font-size: 2.5rem;
        }
        .panel-content p {
          font-size: 1rem;
        }
      }

      /* Floating music button */
      #music-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff4081;
        border: none;
        color: white;
        font-size: 16px;
        padding: 12px 18px;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        transition: background 0.3s, transform 0.2s;
      }

      #music-btn:hover {
        background: #e91e63;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a style="padding-left: 10px" class="navbar-brand" href="#"
          >dzartovs.</a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="#about"> About </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#expertise"> Expertise </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#projects"> Projects </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#philosophy"> Philosophy </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#advisory"> Advisory </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact"> Contact </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Panel -->
    <section class="panel" id="hero">
      <video autoplay muted loop playsinline>
        <source src="./assets/bg.mp4" type="video/mp4" />
      </video>
      <div class="overlay"></div>
      <div class="panel-content">
        <h1>dzartovs.</h1>
        <p style="font-family: 'Courier New', Courier, monospace; padding: 5px">
          Strategy. Systems. Solutions.
        </p>
      </div>
      <audio id="bgm" loop>
        <source src="./assets/audio.mp3" type="audio/mpeg" />
      </audio>
      <button id="music-btn">▶️ Play Music</button>
    </section>

    <!-- Fade-in and scroll script -->
    <script>
      const panels = document.querySelectorAll(".panel");
      const navbar = document.querySelector(".navbar");

      // Fade-in when section enters viewport
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
            }
          });
        },
        { threshold: 0.3 }
      );

      panels.forEach((panel) => observer.observe(panel));

      // Navbar background on scroll
      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          navbar.classList.add("scrolled");
        } else {
          navbar.classList.remove("scrolled");
        }
      });
    </script>

    <script>
      const btn = document.getElementById("music-btn");
      const audio = document.getElementById("bgm");
      let playing = false;

      btn.addEventListener("click", () => {
        if (!playing) {
          audio
            .play()
            .then(() => {
              playing = true;
              btn.textContent = "⏸️ Pause Music";
            })
            .catch((err) => {
              console.log("Audio play prevented:", err);
              alert("Please click again to allow audio playback.");
            });
        } else {
          audio.pause();
          playing = false;
          btn.textContent = "▶️ Play Music";
        }
      });
    </script>

    <!-- Footer -->
    <footer class="footer text-center py-3 bg-dark">
      <div class="container">
        <p class="mb-1">
          <a href="#hero">Back to top ↑</a>
        </p>
        <p class="small mb-0" style="color: white">
          © 2025 dzartovs. All rights reserved.
        </p>
        <p class="small mb-0" style="color: white">
          Designed and built by Shane D. AI content generated with Freepik @
          https://www.freepik.com/
        </p>
      </div>
    </footer>
  </body>
</html>
